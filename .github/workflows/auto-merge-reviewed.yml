# Auto-merge plugin PRs that pass AI review
# Triggers after "Phase 3: AI Code Review" completes.
# Checks if the ai-reviewed label is present, then merges.
name: "Auto-merge reviewed plugins"

on:
  workflow_run:
    workflows: ["Phase 3: AI Code Review"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number from workflow run
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=20" \
            --jq ".[] | select(.head.sha == \"${HEAD_SHA}\") | .number" | head -1)
          if [ -z "$PR_NUM" ]; then
            echo "No open PR found for SHA ${HEAD_SHA}"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"
          LABELS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/labels" --jq '.[].name')
          if echo "$LABELS" | grep -q "ai-reviewed"; then
            echo "has_label=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_label=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR
        if: steps.pr.outputs.found == 'true' && steps.pr.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.pr_number }}"
          echo "Auto-merging PR #${PR_NUM}..."
          gh pr merge "${PR_NUM}" --squash --repo "${{ github.repository }}" --admin --delete-branch || true
